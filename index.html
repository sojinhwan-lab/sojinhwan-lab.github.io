<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLAM — AI Product Studio</title>
<meta name="description" content="주식회사 슬램은 언어와 콘텐츠의 경계를 허무는 AI 제품을 만듭니다.">
<meta property="og:title" content="SLAM — AI Product Studio">
<meta property="og:description" content="We build AI-native products. Seoul, Korea.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0A0A0A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0A0A0A; --border: #1E1E1E; --border2: #2A2A2A; --text: #FFFFFF; --text2: #AAAAAA; --text3: #666666; --nav-h: 60px; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 56px; background: rgba(10,10,10,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-size: 15px; font-weight: 600; letter-spacing: 0.14em; color: var(--text); text-transform: uppercase; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 36px; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-cta { color: var(--text); font-size: 13px; font-weight: 500; text-decoration: none; border-bottom: 1px solid var(--text3); padding-bottom: 1px; transition: border-color 0.2s; }
  .nav-cta:hover { border-color: var(--text2); }
  .hero { min-height: 100vh; padding: calc(var(--nav-h) + 48px) 56px 80px; display: flex; flex-direction: column; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .hero-slam { font-size: clamp(80px, 14vw, 200px); font-weight: 600; letter-spacing: -0.04em; line-height: 1; color: var(--text); }
  .eyebrow { font-size: 11px; letter-spacing: 0.18em; color: var(--text3); text-transform: uppercase; margin-bottom: 16px; }
  .hero-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; margin-top: 48px; }
  .hero-tagline { font-size: clamp(22px, 3.5vw, 42px); font-weight: 300; line-height: 1.15; letter-spacing: -0.02em; color: var(--text); max-width: 600px; }
  .hero-tagline em { font-style: normal; color: var(--text2); }
  .hero-meta { flex-shrink: 0; text-align: right; }
  .hero-desc { font-size: 14px; color: var(--text2); line-height: 1.75; margin-bottom: 24px; }
  .hero-actions { display: flex; gap: 10px; justify-content: flex-end; }
